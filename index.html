<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrazzo Tuinkalender</title>
<style>
  :root{
    --olive:#4a5938; --olive-d:#3a4a2c; --terra:#b3623f; --terra-d:#8f4d31;
    --sand:#f3ede1; --sand-d:#e6dcc8; --ink:#2c2a24; --muted:#6f6a5d;
    --leaf:#6b8f4e; --gold:#c89a3c; --line:#d9d0bd; --card:#fbf8f1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--sand);color:var(--ink);line-height:1.5;padding-bottom:60px}
  header{background:var(--olive);color:var(--sand);padding:18px 16px 14px}
  header .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
  header h1{font-size:1.35rem;font-weight:600;letter-spacing:.3px}
  header .sub{font-size:.82rem;opacity:.85;margin-top:2px}
  .lang{display:flex;gap:4px}
  .lang button{background:rgba(255,255,255,.12);color:var(--sand);border:1px solid rgba(255,255,255,.25);
    padding:5px 11px;border-radius:20px;font-size:.8rem;cursor:pointer;font-weight:600}
  .lang button.active{background:var(--terra);border-color:var(--terra)}
  nav{display:flex;gap:6px;overflow-x:auto;padding:12px 12px 4px;background:var(--olive-d);
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{white-space:nowrap;background:transparent;color:var(--sand);border:1px solid rgba(255,255,255,.22);
    padding:8px 14px;border-radius:20px;font-size:.85rem;cursor:pointer;font-weight:600;flex:0 0 auto}
  nav button.active{background:var(--sand);color:var(--olive-d);border-color:var(--sand)}
  main{max-width:760px;margin:0 auto;padding:16px 14px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .now-banner{background:var(--terra);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .now-banner .label{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;opacity:.9}
  .now-banner .big{font-size:1.5rem;font-weight:700;margin-top:1px}
  .now-banner .small{font-size:.85rem;opacity:.95;margin-top:3px}
  h2.section{font-size:1.05rem;color:var(--olive-d);margin:22px 0 10px;font-weight:700;
    border-bottom:2px solid var(--line);padding-bottom:6px}
  h2.section:first-child{margin-top:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:11px;
    box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card.grass{border-left:5px solid var(--leaf)}
  .card.plant{border-left:5px solid var(--olive)}
  .card.mest{border-left:5px solid var(--gold)}
  .card.snoei{border-left:5px solid var(--terra)}
  .card.alert{border-left:5px solid #c0392b;background:#fdf2ef}
  .card.rust{border-left:5px solid #9aa0a6;background:#f5f4f0}
  .card .ttl{font-weight:700;font-size:.97rem;display:flex;align-items:center;gap:7px}
  .card .tag{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:2px 8px;border-radius:10px;color:#fff;flex:0 0 auto}
  .tag.grass{background:var(--leaf)} .tag.plant{background:var(--olive)}
  .tag.mest{background:var(--gold)} .tag.snoei{background:var(--terra)}
  .tag.alert{background:#c0392b} .tag.rust{background:#9aa0a6}
  .card .body{font-size:.88rem;margin-top:6px;color:var(--ink)}
  .card .meta{font-size:.78rem;color:var(--muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 14px}
  .card .meta span b{color:var(--olive-d)}
  .when{display:inline-block;font-size:.72rem;font-weight:700;background:var(--sand-d);color:var(--olive-d);
    padding:2px 9px;border-radius:10px;margin-top:7px}
  .month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
  .month-grid button{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 4px;
    font-size:.85rem;font-weight:600;color:var(--ink);cursor:pointer;text-align:center}
  .month-grid button.cur{background:var(--olive);color:var(--sand);border-color:var(--olive)}
  .month-grid button.sel{outline:2px solid var(--terra);outline-offset:-2px}
  .season-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .season-row button{flex:1;min-width:70px;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 4px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--ink)}
  .season-row button.sel{background:var(--terra);color:#fff;border-color:var(--terra)}
  table{width:100%;border-collapse:collapse;font-size:.84rem;background:var(--card);border-radius:10px;overflow:hidden}
  th{background:var(--olive);color:var(--sand);text-align:left;padding:9px 10px;font-size:.78rem;font-weight:600}
  td{padding:9px 10px;border-top:1px solid var(--line);vertical-align:top}
  tr:nth-child(even) td{background:rgba(0,0,0,.015)}
  .pill{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;
    background:var(--sand-d);color:var(--olive-d);white-space:nowrap}
  details{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:9px;overflow:hidden}
  details summary{padding:12px 14px;font-weight:700;cursor:pointer;font-size:.92rem;list-style:none;
    display:flex;justify-content:space-between;align-items:center;gap:8px}
  details summary::-webkit-details-marker{display:none}
  details summary::after{content:"+";font-size:1.3rem;color:var(--terra);font-weight:400}
  details[open] summary::after{content:"–"}
  details .dbody{padding:0 14px 14px;font-size:.86rem}
  details .dbody .row{margin-top:8px}
  details .dbody .row b{color:var(--olive-d);display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.4px}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px;font-size:.74rem}
  .legend span{display:inline-flex;align-items:center;gap:5px;color:var(--muted)}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .note{font-size:.82rem;color:var(--muted);font-style:italic;margin:8px 2px 0}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-style:italic}
  footer{text-align:center;font-size:.74rem;color:var(--muted);padding:20px 14px}
  @media(max-width:420px){header h1{font-size:1.15rem}.now-banner .big{font-size:1.25rem}}
  .dbody .pimg{display:block;width:100%;max-width:230px;height:auto;border-radius:8px;margin:2px 0 10px;border:1px solid var(--line)}
</style>
</head>

<header>
  <div class="top">

/* ============ STATE + RENDER ============ */
let lang="nl";
const now=new Date();
const curM=now.getDate? now.getMonth():5;
const curWeek=Math.min(4,Math.floor((now.getDate()-1)/7)+1);
let selM=curM, selSeason=CAL[curM].season, curTab="nu";
const cats=["grass","plant","mest","snoei","alert","rust"];

function L(o){return o?(o[lang]||o.nl):""}
function setLang(l){lang=l;document.getElementById("nl").classList.toggle("active",l=="nl");
  document.getElementById("es").classList.toggle("active",l=="es");
  document.documentElement.lang=l;renderAll()}

function buildNav(){
  const n=document.getElementById("nav");n.innerHTML="";
  Object.keys(T.nav).forEach(k=>{
    const b=document.createElement("button");b.textContent=L(T.nav[k]);
    b.className=k==curTab?"active":"";b.onclick=()=>{curTab=k;showTab(k);buildNav()};n.appendChild(b)})}
function showTab(k){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("v-"+k).classList.add("active");window.scrollTo(0,0)}

function taskCard(t,highlightWeek){
  const c=t.cat;
  let cls="card "+c, hl="";
  if(highlightWeek&&t.when){ /* highlight if matches current week */ }
  let h=`<div class="card ${c}"><div class="ttl"><span class="tag ${c}">${L(T.legend)[cats.indexOf(c)]}</span>${L(t.ttl)}</div>`;
  if(t.body)h+=`<div class="body">${L(t.body)}</div>`;
  if(t.when)h+=`<div class="when">⏱ ${L(t.when)}</div>`;
  if(t.meta)h+=`<div class="meta"><span>${L(t.meta)}</span></div>`;
  h+=`</div>`;return h}

function legendHTML(){let h='<div class="legend">';
  const cols={grass:"var(--leaf)",plant:"var(--olive)",mest:"var(--gold)",snoei:"var(--terra)",alert:"#c0392b",rust:"#9aa0a6"};
  cats.forEach((c,i)=>h+=`<span><i style="background:${cols[c]}"></i>${L(T.legend)[i]}</span>`);
  return h+'</div>'}

function renderNu(){
  const tasks=CAL[curM].tasks, s=CAL[curM].season;
  let h=`<div class="now-banner"><div class="label">${L(T.thisMonth)} · ${L(SEASONS[s])}</div>
    <div class="big">${MONTHS[lang][curM]}</div>`;
  const weekTasks=tasks.filter(t=>t.when&&/week 1/i.test(L(t.when)));
  h+=`<div class="small">${L(T.thisWeek)}: ${L({nl:"week",es:"semana"})} ${curWeek} — ${L(T.weekHint)}</div></div>`;
  h+=legendHTML();
  if(!tasks.length||tasks.every(t=>t.cat=="rust")){
    h+=tasks.map(t=>taskCard(t)).join("");
  }else{
    h+=`<h2 class="section">${MONTHS[lang][curM]}</h2>`;
    h+=tasks.map(t=>taskCard(t,true)).join("");
  }
  document.getElementById("v-nu").innerHTML=h}

function renderMaand(){
  let h=`<h2 class="section">${L(T.pickMonth)}</h2><div class="month-grid">`;
  for(let m=0;m<12;m++){const cl=(m==curM?"cur ":"")+(m==selM?"sel":"");
    h+=`<button class="${cl}" onclick="selM=${m};renderMaand()">${MONTHS[lang][m].slice(0,3)}</button>`}
  h+=`</div>`+legendHTML();
  const tasks=CAL[selM].tasks;
  h+=`<h2 class="section">${MONTHS[lang][selM]} · ${L(SEASONS[CAL[selM].season])}</h2>`;
  h+=tasks.length?tasks.map(t=>taskCard(t)).join(""):`<div class="empty">${L(T.nothing)}</div>`;
  document.getElementById("v-maand").innerHTML=h}

function renderSeizoen(){
  let h=`<h2 class="section">${L(T.pickSeason)}</h2><div class="season-row">`;
  Object.keys(SEASONS).forEach(s=>{h+=`<button class="${s==selSeason?'sel':''}" onclick="selSeason='${s}';renderSeizoen()">${L(SEASONS[s])}</button>`});
  h+=`</div>`+legendHTML();
  SEASONS[selSeason].m.forEach(m=>{
    h+=`<h2 class="section">${MONTHS[lang][m]}</h2>`;
    const tasks=CAL[m].tasks;
    h+=tasks.length?tasks.map(t=>taskCard(t)).join(""):`<div class="empty">${L(T.nothing)}</div>`});
  document.getElementById("v-seizoen").innerHTML=h}

function renderSnoei(){
  let h=`<h2 class="section">${L(T.nav.snoei)}</h2>`;
  SNOEI.forEach(p=>{h+=`<details><summary>${L(p.plant)}<span class="pill">${L(p.tijd)}</span></summary>
    <div class="dbody">
      <div class="row"><b>${L({nl:"Hoe snoeien",es:"Cómo podar"})}</b>${L(p.hoe)}</div>
      <div class="row"><b>${L({nl:"Let op",es:"Atención"})}</b>${L(p.op)}</div>
    </div></details>`});
  document.getElementById("v-snoei").innerHTML=h}

function renderProblemen(){
  let h=`<h2 class="section">${L(T.nav.problemen)}</h2>`;
  PROBLEMEN.forEach((p,i)=>{h+=`<details><summary>${L(p.plant)}<span class="pill">${L(p.symptoom)}</span></summary>
    <div class="dbody">
      ${PIMG[i]?`<img class="pimg" src="${PIMG[i]}" alt="${L(p.plant)}" loading="lazy">`:""}
      <div class="row"><b>${L({nl:"Mogelijke oorzaak",es:"Posible causa"})}</b>${L(p.oorzaak)}</div>
      <div class="row"><b>${L({nl:"Advies",es:"Consejo"})}</b>${L(p.advies)}</div>
    </div></details>`});
  document.getElementById("v-problemen").innerHTML=h}

function renderProducten(){
  let h=`<h2 class="section">${L(T.nav.producten)}</h2>
   <p class="note">${L({nl:"Behandelingen bij hitte: vroege ochtend of late avond. Geduld en consequentie zijn de factor.",es:"Tratamientos con calor: temprano o por la tarde. Paciencia y constancia es la clave."})}</p>`;
  PRODUCTEN.forEach(p=>{h+=`<details><summary>${p.n}<span class="pill">${L(p.freq)}</span></summary>
    <div class="dbody">
      <div class="row"><b>${L({nl:"Voor",es:"Para"})}</b>${L(p.voor)}</div>
      <div class="row"><b>${L({nl:"Periode",es:"Periodo"})}</b>${L(p.per)}</div>
      <div class="row"><b>${L({nl:"Gebruik",es:"Uso"})}</b>${L(p.d)}</div>
    </div></details>`});
  document.getElementById("v-producten").innerHTML=h}

function renderAll(){buildNav();renderNu();renderMaand();renderSeizoen();renderSnoei();renderProblemen();renderProducten();
  document.querySelectorAll("[data-i]").forEach(e=>{const k=e.getAttribute("data-i");if(T[k])e.textContent=L(T[k])})}
renderAll();showTab(curTab);
</script>
</body>
</html>
